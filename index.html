<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e1726">
<title>Atlas — Training Tracker</title>
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Atlas%22%2C%22short_name%22%3A%22Atlas%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230e1726%22%2C%22theme_color%22%3A%22%230e1726%22%2C%22icons%22%3A%5B%5D%7D">
<style>
/* ===================== THEME TOKENS ===================== */
:root{
  --radius:16px; --radius-sm:11px;
  --accent:#4f7cff; --accent-soft:rgba(79,124,255,.14);
  --accent2:#1fb6a6; --gold:#e7b94f; --danger:#f0596b;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --shadow:0 6px 24px rgba(0,0,0,.18);
  --side-w:248px;
}
html[data-theme="dark"]{
  --bg:#0b1320; --bg2:#0e1726; --surface:#141d2e; --surface2:#1b2740;
  --border:#23304b; --text:#eaf0fb; --muted:#8b97ad; --inv:#0b1320;
}
html[data-theme="light"]{
  --bg:#f2f5fa; --bg2:#ffffff; --surface:#ffffff; --surface2:#f0f3f9;
  --border:#dde3ec; --text:#16202f; --muted:#697587; --inv:#ffffff;
  --shadow:0 6px 24px rgba(20,40,80,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15.5px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{margin:0 0 .5em;font-weight:700;letter-spacing:-.01em}
h1{font-size:1.45rem} h2{font-size:1.15rem} h3{font-size:1rem} h4{font-size:.9rem}
p{margin:.3em 0 .7em}
.hidden{display:none!important}
svg.ic{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
svg.ic.sm{width:16px;height:16px}
svg.ic.lg{width:26px;height:26px}

/* ===================== APP SHELL ===================== */
#app-shell{display:flex;min-height:100vh}
/* Sidebar (right side per request, but DOM order handled via flex) */
#shell-main{flex:1;min-width:0;display:flex;flex-direction:column;order:1}
#sidebar{
  order:2; width:var(--side-w); flex-shrink:0; background:var(--bg2);
  border-left:1px solid var(--border); padding:18px 14px;
  position:sticky; top:0; height:100vh; overflow-y:auto;
  display:flex; flex-direction:column; gap:4px;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;font-weight:800;font-size:1.2rem;letter-spacing:-.02em}
.brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;color:var(--muted);cursor:pointer;font-weight:600;font-size:.93rem;transition:.12s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent)}
.nav-item .ic{stroke-width:2}
.side-foot{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding-top:12px;border-top:1px solid var(--border)}
.side-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:11px;cursor:pointer}
.side-user:hover{background:var(--surface2)}
.avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--muted);flex-shrink:0}
.content{flex:1;max-width:820px;width:100%;margin:0 auto;padding:22px 20px 40px}
@media(max-width:760px){
  #sidebar{display:none}
  .content{padding:16px 14px calc(80px + var(--safe-b))}
}
/* Mobile bottom nav */
#mobnav{display:none}
@media(max-width:760px){
  #mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding-bottom:var(--safe-b);z-index:60}
  #mobnav button{flex:1;background:none;border:none;padding:9px 2px;color:var(--muted);font-size:.62rem;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px}
  #mobnav button.active{color:var(--accent)}
  #mobMore{position:fixed;bottom:calc(60px + var(--safe-b));right:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);z-index:61;overflow:hidden;min-width:180px}
  #mobMore button{display:flex;align-items:center;gap:10px;width:100%;padding:13px 16px;background:none;border:none;color:var(--text);font-weight:600;font-size:.9rem;border-bottom:1px solid var(--border)}
}

/* ===================== COMPONENTS ===================== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.card.tight{padding:13px}
.card.flat{box-shadow:none}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:560px){.g3,.g4{grid-template-columns:1fr 1fr}}
.row{display:flex;gap:12px;align-items:center}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.wrap{flex-wrap:wrap}
.spacer{height:10px}.divider{height:1px;background:var(--border);margin:16px 0}
.muted{color:var(--muted)}.small{font-size:.84rem}.center{text-align:center}
.section-h{display:flex;align-items:center;justify-content:space-between;margin:22px 0 12px}
.section-h h2{margin:0}

.stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:15px;text-align:center}
.stat .n{font-size:1.55rem;font-weight:800;color:var(--accent);line-height:1.1}
.stat .l{font-size:.75rem;color:var(--muted);margin-top:4px}

button,.btn{font:inherit;cursor:pointer;border-radius:12px;padding:13px 16px;background:var(--surface2);color:var(--text);border:1px solid var(--border);font-weight:600;transition:.12s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
button:active,.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent{background:var(--accent2);color:#04231f;border-color:var(--accent2)}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn-ghost{background:transparent;border-color:transparent}
.btn-outline{background:transparent}
.btn-block{display:flex;width:100%}
.btn-lg{padding:16px;font-size:1.02rem}
.btn-sm{padding:8px 12px;font-size:.85rem}
.btn-row{display:flex;gap:10px}.btn-row>*{flex:1}
.iconbtn{padding:10px;width:42px;height:42px}

label{display:block;font-size:.8rem;color:var(--muted);margin:12px 0 5px;font-weight:600}
input,select,textarea{width:100%;font:inherit;padding:13px 13px;border-radius:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
html[data-theme="light"] input,html[data-theme="light"] select,html[data-theme="light"] textarea{background:var(--bg)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
textarea{min-height:72px;resize:vertical}
.frow{display:flex;gap:11px}.frow>div{flex:1}

.chips{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0}
.chip{padding:8px 13px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);font-size:.83rem;cursor:pointer;font-weight:500}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);font-size:.74rem;color:var(--muted);margin:2px 5px 2px 0}
.tag.a{color:var(--accent2);border-color:var(--accent2)}
.tag.b{color:var(--accent);border-color:var(--accent)}

.litem{display:flex;align-items:center;gap:13px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:11px;cursor:pointer;transition:.12s}
.litem:hover{border-color:var(--accent);background:var(--surface2)}
.thumb{width:56px;height:56px;border-radius:12px;object-fit:cover;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.lbody{flex:1;min-width:0}.ltitle{font-weight:700}.lsub{font-size:.82rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

table{width:100%;border-collapse:collapse;font-size:.92rem}
th,td{padding:10px 7px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.03em}
td.num,th.num{text-align:right}

.modal-bg{position:fixed;inset:0;background:rgba(6,10,20,.55);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:var(--surface);width:100%;max-width:600px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:20px 18px calc(22px + var(--safe-b));border:1px solid var(--border)}
@media(min-width:600px){.modal-bg{align-items:center;padding:20px}.modal{border-radius:20px}}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}.modal-h h2{margin:0}
.xbtn{background:none;border:none;color:var(--muted);padding:6px;border-radius:8px}

.empty{text-align:center;color:var(--muted);padding:46px 18px}
.empty .ei{width:46px;height:46px;margin:0 auto 12px;color:var(--border)}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:12px 20px;border-radius:12px;z-index:300;font-weight:600;box-shadow:var(--shadow);max-width:90%}
.pr-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(231,185,79,.14);color:var(--gold);border:1px solid rgba(231,185,79,.45);border-radius:999px;padding:4px 12px;font-size:.78rem;font-weight:700}
.streak{display:inline-flex;align-items:center;gap:5px;color:var(--gold);font-weight:700}

.set-grid{display:grid;grid-template-columns:30px 1fr 1fr 1fr 34px;gap:7px;align-items:center;margin-bottom:7px}
.set-grid input{padding:11px 6px;text-align:center}
.set-grid .sn{text-align:center;color:var(--muted);font-weight:700}

.bars{display:flex;flex-direction:column;gap:9px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:.85rem}
.bar-row .bl{width:96px;flex-shrink:0;color:var(--muted);font-size:.8rem}
.bar-track{flex:1;height:16px;background:var(--surface2);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;background:var(--accent)}
svg.chart{width:100%;height:auto;display:block;overflow:visible}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:.78rem;color:var(--muted);margin-top:8px}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px}

/* Rest timer overlay */
#restBar{position:fixed;left:0;right:0;bottom:0;z-index:80;background:var(--accent);color:#fff;padding:12px 18px calc(12px + var(--safe-b));display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 20px rgba(0,0,0,.25)}
@media(max-width:760px){#restBar{bottom:calc(60px + var(--safe-b))}}
#restBar .rt{font-size:1.6rem;font-weight:800;font-variant-numeric:tabular-nums}
#restBar button{background:rgba(255,255,255,.2);border:none;color:#fff}
.run-clock{display:inline-flex;align-items:center;gap:7px;background:var(--accent-soft);color:var(--accent);padding:7px 13px;border-radius:999px;font-weight:800;font-variant-numeric:tabular-nums}

/* Calendar */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow{text-align:center;font-size:.72rem;color:var(--muted);font-weight:600;padding:4px 0}
.cal-cell{aspect-ratio:1;border:1px solid var(--border);border-radius:10px;padding:5px;font-size:.8rem;cursor:pointer;position:relative;display:flex;flex-direction:column;background:var(--surface)}
.cal-cell.empty{border:none;background:none;cursor:default}
.cal-cell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.cal-cell .cd{font-weight:600}
.cal-cell .dots{display:flex;gap:2px;flex-wrap:wrap;margin-top:auto}
.cal-cell .cdot{width:6px;height:6px;border-radius:50%;background:var(--accent2)}
.cal-cell .planned{width:6px;height:6px;border-radius:50%;background:var(--gold)}
.cal-cell.has{background:var(--accent-soft)}

/* Auth screen */
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(120% 100% at 50% 0,var(--bg2),var(--bg))}
.auth-card{width:100%;max-width:380px}
.auth-logo{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;margin:0 auto 16px}
.seg{display:flex;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:8px}
.seg button{flex:1;background:none;border:none;padding:10px;border-radius:9px;color:var(--muted);font-weight:700}
.seg button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
</style>
</head>
<body>
<div id="auth" class="hidden"></div>
<div id="app-shell" class="hidden">
  <div id="shell-main">
    <div class="content"><div id="view"></div></div>
  </div>
  <aside id="sidebar"></aside>
</div>
<div id="mobnav"></div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>
<div id="restRoot"></div>

<script>
/* ===================================================================
   ATLAS — Training Tracker (single-file local PWA, multi-account)
   =================================================================== */

/* ---------- SVG ICON SET (clean line icons, no emoji) ---------- */
const ICON = {
  home:'<path d="M3 11l9-8 9 8"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/>',
  dumbbell:'<path d="M6.5 6.5l11 11"/><path d="M21 21l-1-1"/><path d="M3 3l1 1"/><rect x="2.5" y="8.5" width="4" height="7" rx="1" transform="rotate(-45 4.5 12)"/><rect x="17.5" y="8.5" width="4" height="7" rx="1" transform="rotate(-45 19.5 12)"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  chart:'<path d="M3 3v18h18"/><path d="M7 14l3-4 3 3 4-6"/>',
  calendar:'<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',
  scale:'<path d="M12 3v3"/><path d="M5 6h14"/><path d="M7 6l-3 7a4 4 0 0 0 8 0L9 6"/><path d="M17 6l-3 7a4 4 0 0 0 8 0l-4-7"/><path d="M9 21h6"/>',
  body:'<circle cx="12" cy="5" r="2.4"/><path d="M12 7.5v7M12 9l-5 2M12 9l5 2M12 14.5L8 21M12 14.5L16 21"/>',
  settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 0 1 0-4h.1A1.6 1.6 0 0 0 2.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 7 2.6h.1A1.6 1.6 0 0 0 8 1.1V1a2 2 0 0 1 4 0v.1A1.6 1.6 0 0 0 13 2.6a1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V7a1.6 1.6 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  timer:'<path d="M10 2h4M12 14l3-3"/><circle cx="12" cy="14" r="8"/>',
  trophy:'<path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4z"/><path d="M7 6H4v1a3 3 0 0 0 3 3M17 6h3v1a3 3 0 0 0-3 3"/>',
  flame:'<path d="M12 2s5 4 5 9a5 5 0 0 1-10 0c0-1.5.7-2.8 1.5-3.7C8.8 8 9 9 9 9s.5-3 3-7z"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>',
  camera:'<path d="M3 8a2 2 0 0 1 2-2h2l1.5-2h7L19 6h2a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8z"/><circle cx="12" cy="13" r="3.5"/>',
  edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>',
  trash:'<path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',
  x:'<path d="M18 6L6 18M6 6l12 12"/>',
  chevron:'<path d="M9 18l6-6-6-6"/>',
  left:'<path d="M15 18l-6-6 6-6"/>',
  right:'<path d="M9 18l6-6-6-6"/>',
  sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/>',
  moon:'<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>',
  list:'<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>',
  play:'<path d="M6 4l14 8-14 8V4z"/>',
  check:'<path d="M20 6L9 17l-5-5"/>',
  logout:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>',
  download:'<path d="M12 3v12M7 10l5 5 5-5M5 21h14"/>',
  upload:'<path d="M12 21V9M7 14l5-5 5 5M5 3h14"/>',
  target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/>',
  ruler:'<rect x="2" y="7" width="20" height="10" rx="1.5"/><path d="M6 7v3M10 7v4M14 7v3M18 7v4"/>',
  user:'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>',
};
function ic(name,cls=''){return `<svg class="ic ${cls}" viewBox="0 0 24 24">${ICON[name]||''}</svg>`;}

/* ---------- TAXONOMY ---------- */
const CATEGORIES=['Brust','Rücken','Beine','Schultern','Arme','Bauch/Core','Cardio','Ganzkörper'];
const MUSCLES=[
  'Brust (oben)','Brust (mitte)','Brust (unten)',
  'Latissimus','Oberer Rücken','Mittlerer Rücken','Unterer Rücken','Nacken/Trapez',
  'Vordere Schulter','Seitliche Schulter','Hintere Schulter',
  'Bizeps','Trizeps','Unterarme',
  'Quadrizeps','Beinbeuger','Gesäß','Waden','Adduktoren','Abduktoren',
  'Bauch (gerade)','Bauch (seitlich)','Core/Stabilität'
];
const DIFFICULTY=['Anfänger','Mittel','Fortgeschritten'];

/* ---------- STORAGE: multi-account ---------- */
const ROOT_KEY='atlas_root_v1';
function loadRoot(){
  try{const r=localStorage.getItem(ROOT_KEY);if(r)return JSON.parse(r);}catch(e){}
  return {accounts:[],currentId:null,theme:'dark'};
}
let ROOT=loadRoot();
function saveRoot(){localStorage.setItem(ROOT_KEY,JSON.stringify(ROOT));}

function blankData(){
  return {
    exercises:[], workouts:[], plans:[],
    bodyweight:[],   // {date,value}
    measures:[],     // {date, chest,waist,hips,arm,thigh}
    planned:[],      // {id,date,planId,planName,note,done}
    settings:{unit:'kg',restSec:120,weekGoal:4}
  };
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

// simple non-cryptographic hash for local password gate (this is a local-only app, not a security boundary)
function hashPw(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return (h>>>0).toString(16);}

let ACCOUNT=null, DB=null;
function currentAccount(){return ROOT.accounts.find(a=>a.id===ROOT.currentId)||null;}
function loadSession(){
  ACCOUNT=currentAccount();
  if(ACCOUNT){DB=Object.assign(blankData(),ACCOUNT.data||{}); ACCOUNT.data=DB;}
}
function save(){if(ACCOUNT){ACCOUNT.data=DB;saveRoot();}}

/* ---------- THEME ---------- */
function applyTheme(){document.documentElement.setAttribute('data-theme',ROOT.theme||'dark');
  document.querySelector('meta[name=theme-color]').setAttribute('content',ROOT.theme==='light'?'#ffffff':'#0e1726');}
function toggleTheme(){ROOT.theme=ROOT.theme==='light'?'dark':'light';saveRoot();applyTheme();render();}

/* ---------- SHORTCUTS / FORMAT ---------- */
const $=s=>document.querySelector(s);
const view=()=>$('#view');
const U=()=>DB.settings.unit;
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtDate(d){return new Date(d+'T00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtShort(d){return new Date(d+'T00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'short'});}
function fmtWD(d){return new Date(d+'T00:00').toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'});}
function todayISO(){const d=new Date();return new Date(d-d.getTimezoneOffset()*6e4).toISOString().slice(0,10);}
function round(n,d=1){const f=10**d;return Math.round(n*f)/f;}
function kshort(n){return n>=1000?round(n/1000,1)+'k':Math.round(n)+'';}
function exById(id){return DB.exercises.find(e=>e.id===id);}
function initials(name){return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();}

function toast(msg){const r=$('#toastRoot');r.innerHTML=`<div class="toast">${esc(msg)}</div>`;clearTimeout(r._t);r._t=setTimeout(()=>r.innerHTML='',2200);}

/* ---------- IMAGE downscale ---------- */
function fileToThumb(file,maxDim=900){
  return new Promise(res=>{const fr=new FileReader();fr.onload=()=>{const img=new Image();img.onload=()=>{
    let{width:w,height:h}=img;if(w>maxDim||h>maxDim){const r=Math.min(maxDim/w,maxDim/h);w=Math.round(w*r);h=Math.round(h*r);}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    res(c.toDataURL('image/jpeg',0.82));};img.src=fr.result;};fr.readAsDataURL(file);});
}

/* ---------- METRICS ---------- */
function setVol(s){return (parseFloat(s.w)||0)*(parseInt(s.reps)||0);}
function entryVol(e){return e.sets.reduce((a,s)=>a+setVol(s),0);}
function workoutVol(w){return w.entries.reduce((a,e)=>a+entryVol(e),0);}
function e1rm(w,reps){w=parseFloat(w)||0;reps=parseInt(reps)||0;if(!w||!reps)return 0;return w*(1+reps/30);}

function exStats(exId){
  let maxW=0,maxReps=0,maxVol=0,maxE1=0,sessions=0,totalVol=0,lastDate=null;const series=[];
  DB.workouts.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(w=>{
    const e=w.entries.find(x=>x.exId===exId);if(!e)return;sessions++;
    let topW=0,vol=0,bestE1=0,topReps=0;
    e.sets.forEach(s=>{const ww=parseFloat(s.w)||0,rr=parseInt(s.reps)||0,ee=e1rm(ww,rr);
      if(ww>maxW)maxW=ww;if(rr>maxReps)maxReps=rr;if(ee>maxE1)maxE1=ee;
      if(ww>topW)topW=ww;if(rr>topReps)topReps=rr;if(ee>bestE1)bestE1=ee;vol+=ww*rr;});
    if(vol>maxVol)maxVol=vol;totalVol+=vol;lastDate=w.date;
    series.push({date:w.date,topW,vol,e1rm:bestE1,reps:topReps});
  });
  return {maxW,maxReps,maxVol,maxE1:round(maxE1),sessions,totalVol,lastDate,series};
}
function detectPRs(workout){
  const prs=[];
  workout.entries.forEach(e=>{
    let pW=0,pR=0,pV=0;
    DB.workouts.forEach(w=>{if(w.id===workout.id||w.date>workout.date)return;const pe=w.entries.find(x=>x.exId===e.exId);if(!pe)return;
      let v=0;pe.sets.forEach(s=>{const ww=parseFloat(s.w)||0,rr=parseInt(s.reps)||0;if(ww>pW)pW=ww;if(rr>pR)pR=rr;v+=ww*rr;});if(v>pV)pV=v;});
    let cW=0,cR=0,cV=0,best=null;
    e.sets.forEach(s=>{const ww=parseFloat(s.w)||0,rr=parseInt(s.reps)||0;if(ww>cW){cW=ww;best=s;}if(rr>cR)cR=rr;cV+=ww*rr;});
    if(cW>pW&&cW>0)prs.push({ex:e.exName,type:'Gewicht',detail:`${cW} ${U()} × ${best?best.reps:''}`});
    else if(cR>pR&&cR>0&&pR>0)prs.push({ex:e.exName,type:'Wiederholungen',detail:`${cR} Wdh`});
    if(cV>pV&&pV>0)prs.push({ex:e.exName,type:'Volumen',detail:`${Math.round(cV)} ${U()}`});
  });
  return prs;
}
function currentStreak(){
  // consecutive weeks (Mon-Sun) with >=1 workout, counting back from this week
  if(!DB.workouts.length)return 0;
  const set=new Set(DB.workouts.map(w=>weekKey(w.date)));
  let streak=0,cur=new Date();
  for(;;){const k=weekKey(isoOf(cur));if(set.has(k)){streak++;cur.setDate(cur.getDate()-7);}else break;}
  return streak;
}
function isoOf(d){return new Date(d-d.getTimezoneOffset()*6e4).toISOString().slice(0,10);}
function weekKey(iso){const d=new Date(iso+'T00:00');const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return isoOf(d);}

/* ---------- LINE CHART ---------- */
function lineChart(points,{color='var(--accent)',h=170,fill=true,label='',unit=''}={}){
  if(!points.length)return `<div class="empty small">Noch keine Daten</div>`;
  const w=620,padL=38,padR=14,padT=22,padB=26;
  const ys=points.map(p=>p.y);let minY=Math.min(...ys),maxY=Math.max(...ys);
  if(minY===maxY){minY-=1;maxY+=1;}const span=maxY-minY;
  const X=i=>padL+(points.length===1?(w-padL-padR)/2:i/(points.length-1)*(w-padL-padR));
  const Y=v=>padT+(1-(v-minY)/span)*(h-padT-padB);
  let line='';points.forEach((p,i)=>{line+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(p.y).toFixed(1)+' ';});
  const area=`M${X(0)} ${h-padB} `+points.map((p,i)=>`L${X(i).toFixed(1)} ${Y(p.y).toFixed(1)} `).join('')+`L${X(points.length-1)} ${h-padB} Z`;
  const dots=points.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.y).toFixed(1)}" r="3" fill="${color}"/>`).join('');
  const gl=[0,.5,1].map(t=>{const v=minY+span*t,y=Y(v);return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1"/><text x="4" y="${(y+4).toFixed(1)}" font-size="10" fill="var(--muted)">${round(v)}</text>`;}).join('');
  const step=Math.ceil(points.length/6);
  const xl=points.map((p,i)=>(points.length<=7||i%step===0||i===points.length-1)?`<text x="${X(i).toFixed(1)}" y="${h-8}" font-size="10" fill="var(--muted)" text-anchor="middle">${esc(p.x)}</text>`:'').join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">${gl}
    ${fill?`<path d="${area}" fill="${color}" opacity="0.1"/>`:''}
    <path d="${line}" fill="none" stroke="${color}" stroke-width="2.5"/>${dots}${xl}
    <text x="${w-padR}" y="13" font-size="10" fill="var(--muted)" text-anchor="end">${esc(label)}${unit?' ('+unit+')':''}</text></svg>`;
}

let authMode='login';
function showAuth(){
  $('#app-shell').classList.add('hidden');$('#mobnav').classList.add('hidden');
  $('#auth').classList.remove('hidden');renderAuth();
}
function renderAuth(){
  const hasAccts=ROOT.accounts.length>0;
  if(!hasAccts)authMode='register';
  $('#auth').innerHTML=`<div class="auth-card">
    <div class="auth-logo">${ic('dumbbell','lg')}</div>
    <h1 class="center" style="margin-bottom:4px">Atlas</h1>
    <p class="center muted small" style="margin-bottom:18px">Dein persönlicher Trainings-Tracker</p>
    <div class="card">
      <div class="seg">
        <button class="${authMode==='login'?'active':''}" onclick="authMode='login';renderAuth()">Anmelden</button>
        <button class="${authMode==='register'?'active':''}" onclick="authMode='register';renderAuth()">Account erstellen</button>
      </div>
      ${authMode==='login'?authLogin():authRegister()}
    </div>
    <p class="center small muted">Alle Daten bleiben nur auf diesem Gerät.</p>
  </div>`;
}
function authLogin(){
  const accts=ROOT.accounts;
  if(!accts.length)return `<p class="muted small center">Noch kein Account. Erstelle zuerst einen.</p>`;
  return `<label>Account</label>
    <select id="lg_user">${accts.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('')}</select>
    <label>Passwort</label><input type="password" id="lg_pw" placeholder="Passwort" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="spacer"></div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Anmelden</button>
    <p class="small muted center" style="margin-top:10px;cursor:pointer" onclick="resetPw()">Passwort vergessen?</p>`;
}
function authRegister(){
  return `<label>Name</label><input id="rg_name" placeholder="Dein Name">
    <label>Passwort</label><input type="password" id="rg_pw" placeholder="Passwort wählen">
    <label>Passwort wiederholen</label><input type="password" id="rg_pw2" placeholder="Wiederholen" onkeydown="if(event.key==='Enter')doRegister()">
    <div class="spacer"></div>
    <button class="btn btn-primary btn-block" onclick="doRegister()">Account erstellen & starten</button>`;
}
function doRegister(){
  const name=$('#rg_name').value.trim(),pw=$('#rg_pw').value,pw2=$('#rg_pw2').value;
  if(!name){toast('Bitte Namen eingeben');return;}
  if(pw.length<3){toast('Passwort zu kurz (min. 3)');return;}
  if(pw!==pw2){toast('Passwörter stimmen nicht überein');return;}
  if(ROOT.accounts.some(a=>a.name.toLowerCase()===name.toLowerCase())){toast('Name existiert bereits');return;}
  const acc={id:uid(),name,pw:hashPw(pw),profile:{name,weight:'',height:'',age:'',photo:''},data:blankData()};
  ROOT.accounts.push(acc);ROOT.currentId=acc.id;saveRoot();
  loadSession();enterApp();toast('Willkommen, '+name+'!');
}
function doLogin(){
  const id=$('#lg_user').value,pw=$('#lg_pw').value;
  const acc=ROOT.accounts.find(a=>a.id===id);if(!acc)return;
  if(acc.pw!==hashPw(pw)){toast('Falsches Passwort');return;}
  ROOT.currentId=acc.id;saveRoot();loadSession();enterApp();
}
function resetPw(){
  const id=$('#lg_user')?.value;const acc=ROOT.accounts.find(a=>a.id===id);if(!acc)return;
  const np=prompt('Da Daten lokal liegen, kannst du das Passwort hier neu setzen für "'+acc.name+'":');
  if(np&&np.length>=3){acc.pw=hashPw(np);saveRoot();toast('Passwort neu gesetzt');}
}
function logout(){ROOT.currentId=null;saveRoot();ACCOUNT=null;DB=null;showAuth();}
function enterApp(){$('#auth').classList.add('hidden');$('#app-shell').classList.remove('hidden');$('#mobnav').classList.remove('hidden');route='dash';render();}

   DASHBOARD
   =================================================================== */
function viewDash(){
  const ws=DB.workouts.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const last=ws[0];
  const wk=weekKey(todayISO());
  const thisWeek=DB.workouts.filter(w=>weekKey(w.date)===wk);
  const goal=DB.settings.weekGoal||4;
  const totalVol=DB.workouts.reduce((a,w)=>a+workoutVol(w),0);
  const streak=currentStreak();
  const freq={};DB.workouts.forEach(w=>w.entries.forEach(e=>freq[e.exId]=(freq[e.exId]||0)+1));
  const favs=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([id,n])=>({ex:exById(id),n})).filter(x=>x.ex);
  const recentPRs=recentRecords();
  const nextPlanned=DB.planned.filter(p=>!p.done&&p.date>=todayISO()).sort((a,b)=>a.date.localeCompare(b.date))[0];
  const bw=DB.bodyweight.slice().sort((a,b)=>a.date.localeCompare(b.date));

  view().innerHTML=`
    <div class="between"><h1>Hi ${esc((ACCOUNT.profile&&ACCOUNT.profile.name)||ACCOUNT.name)}</h1>
      ${streak>0?`<span class="streak">${ic('flame','sm')} ${streak} Wo. Serie</span>`:''}</div>

    <div class="card tight">
      <div class="between"><h3 style="margin:0">Diese Woche</h3><span class="muted small">${thisWeek.length}/${goal} Trainings</span></div>
      <div class="bar-track" style="margin-top:8px;height:12px"><div class="bar-fill" style="width:${Math.min(100,thisWeek.length/goal*100)}%"></div></div>
    </div>

    <div class="grid g3">
      <div class="stat"><div class="n">${DB.workouts.length}</div><div class="l">Trainings gesamt</div></div>
      <div class="stat"><div class="n">${kshort(totalVol)}</div><div class="l">Volumen (${U()})</div></div>
      <div class="stat"><div class="n">${DB.exercises.length}</div><div class="l">Übungen</div></div>
    </div>

    <button class="btn btn-primary btn-block btn-lg" style="margin:4px 0 6px" onclick="go('log')">${ic('play')} Training starten</button>

    ${nextPlanned?`<div class="card tight" onclick="go('calendar')" style="cursor:pointer">
      <div class="between"><div class="row">${ic('calendar','sm')}<div><div style="font-weight:700">Geplant: ${esc(nextPlanned.planName||'Training')}</div><div class="muted small">${fmtWD(nextPlanned.date)}</div></div></div>${ic('chevron','sm')}</div></div>`:''}

    <div class="section-h"><h2>Letztes Training</h2></div>
    ${last?workoutCard(last):`<div class="card center muted">Noch kein Training erfasst.</div>`}

    ${bw.length>=2?`<div class="card"><div class="between"><h3>Gewichtsverlauf</h3><span class="muted small">${bw[bw.length-1].value} ${U()}</span></div>
      ${lineChart(bw.map(b=>({x:fmtShort(b.date),y:b.value})),{color:'var(--accent2)',label:'Körpergewicht',unit:U(),h:150})}</div>`:''}

    <div class="section-h"><h2>Aktuelle Rekorde</h2></div>
    ${recentPRs.length?`<div class="card tight">${recentPRs.map(p=>`<div class="between" style="padding:7px 0;border-bottom:1px solid var(--border)"><span class="pr-badge">${ic('trophy','sm')} ${esc(p.ex)}</span><strong>${esc(p.detail)}</strong></div>`).join('')}</div>`:`<div class="card center muted">Noch keine Rekorde — leg los!</div>`}

    ${favs.length?`<div class="section-h"><h2>Häufigste Übungen</h2></div>${favs.map(f=>exListItem(f.ex,`${f.n}× trainiert`)).join('')}`:''}

function recentRecords(){
  return DB.exercises.map(ex=>{const st=exStats(ex.id);return st.maxW>0?{ex:ex.name,detail:`${st.maxW} ${U()}`,date:st.lastDate}:null;})
    .filter(Boolean).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,5);
}
function workoutCard(w){
  return `<div class="card" style="cursor:pointer" onclick="openWorkout('${w.id}')">
    <div class="between"><strong>${fmtDate(w.date)}</strong><span class="muted small">${w.duration?w.duration+' Min · ':''}${Math.round(workoutVol(w))} ${U()}</span></div>
    <div class="muted small" style="margin-top:6px">${w.entries.map(e=>esc(e.exName)).join(' · ')||'—'}</div>

}

  if(exFilter.q){const q=exFilter.q.toLowerCase();list=list.filter(e=>(e.name+' '+(e.notes||'')+' '+(e.target||'')+' '+(e.secondary||[]).join(' ')).toLowerCase().includes(q));}

}

}

}
function renderPhotoStrip(){

    +(tmp.photos.length?`<div class="small muted" style="width:100%">Tippe ein Foto = Titelbild</div>`:'');

async function addPhoto(input){if(!input.files[0])return;const d=await fileToThumb(input.files[0]);const t=window._tmpEx;t.photos.push(d);if(!t.cover)t.cover=d;renderPhotoStrip();input.value='';}
function setCover(i){window._tmpEx.cover=window._tmpEx.photos[i];renderPhotoStrip();}
function rmPhoto(i){const t=window._tmpEx,p=t.photos[i];t.photos.splice(i,1);if(t.cover===p)t.cover=t.photos[0]||'';renderPhotoStrip();}

function delExercise(id){if(!confirm('Übung löschen? Trainingsdaten bleiben erhalten.'))return;DB.exercises=DB.exercises.filter(e=>e.id!==id);save();closeModal();viewExercises();toast('Gelöscht');}

    <div>${ex.target?`<span class="tag b">${ic('target','sm')} ${esc(ex.target)}</span>`:''}${(ex.secondary||[]).map(m=>`<span class="tag">${esc(m)}</span>`).join('')}</div>

/* ===================================================================
   WORKOUT LOGGING — with live clock + rest timer
   =================================================================== */
let draft=null;       // active workout being logged
let clockTimer=null;  // interval for the running session clock
let rest={timer:null,end:0,total:0};

function viewLog(){
  if(!draft)draft={date:todayISO(),duration:'',notes:'',entries:[],startTs:Date.now()};
  if(!clockTimer)clockTimer=setInterval(updateClock,1000);
  renderLog();
}
function elapsedSec(){return draft&&draft.startTs?Math.floor((Date.now()-draft.startTs)/1000):0;}
function fmtClock(sec){const m=Math.floor(sec/60),s=sec%60;return `${m}:${String(s).padStart(2,'0')}`;}
function updateClock(){const el=$('#sessClock');if(el)el.textContent=fmtClock(elapsedSec());}

function renderLog(){
  view().innerHTML=`
    <div class="between" style="margin-bottom:6px"><h1 style="margin:0">Training</h1>
      <span class="run-clock">${ic('clock','sm')} <span id="sessClock">${fmtClock(elapsedSec())}</span></span></div>
    <div class="frow">
      <div><label>Datum</label><input type="date" value="${draft.date}" onchange="draft.date=this.value"></div>
      <div><label>Dauer (Min, optional)</label><input type="number" inputmode="numeric" placeholder="läuft automatisch" value="${draft.duration}" oninput="draft.duration=this.value"></div>
    </div>
    <div id="entries">${draft.entries.map((e,i)=>entryHTML(e,i)).join('')}</div>
    <button class="btn btn-outline btn-block" style="margin-top:6px" onclick="pickExercise()">${ic('plus','sm')} Übung hinzufügen</button>
    <label>Notizen</label><textarea oninput="draft.notes=this.value">${esc(draft.notes)}</textarea>
    <div class="spacer"></div>
    <button class="btn btn-primary btn-block btn-lg" onclick="finishWorkout()">${ic('check')} Training speichern</button>
    <div class="spacer"></div>
    <button class="btn btn-ghost btn-block muted" onclick="cancelWorkout()">Verwerfen</button>`;
}
function entryHTML(e,i){
  return `<div class="card tight">
    <div class="between"><strong>${esc(e.exName)}</strong><button class="btn-ghost iconbtn muted" onclick="rmEntry(${i})">${ic('x','sm')}</button></div>
    <div class="set-grid muted small" style="margin-bottom:2px"><div>Satz</div><div class="center">${U()}</div><div class="center">Wdh</div><div class="center">RPE</div><div></div></div>
    ${e.sets.map((s,j)=>`<div class="set-grid">
      <div class="sn">${j+1}</div>
      <input inputmode="decimal" value="${s.w}" oninput="draft.entries[${i}].sets[${j}].w=this.value">
      <input inputmode="numeric" value="${s.reps}" oninput="draft.entries[${i}].sets[${j}].reps=this.value">
      <input inputmode="numeric" value="${s.rpe}" placeholder="–" oninput="draft.entries[${i}].sets[${j}].rpe=this.value">
      <button class="btn-ghost muted" style="padding:6px" onclick="doneSet(${i},${j})" title="Satz fertig → Pause">${ic('check','sm')}</button>
    </div>`).join('')}
    <div class="btn-row" style="margin-top:6px">
      <button class="btn btn-sm btn-outline" onclick="addSet(${i})">${ic('plus','sm')} Satz</button>
      <button class="btn btn-sm btn-outline" onclick="startRest()">${ic('timer','sm')} Pause</button>
    </div></div>`;
}
function pickExercise(){
  const list=DB.exercises.slice().sort((a,b)=>a.name.localeCompare(b.name));
  openModal('Übung wählen',`${list.length?'':`<div class="empty">Lege zuerst eine Übung an.</div>`}
    ${list.map(ex=>`<div class="litem" onclick="addEntry('${ex.id}')">${exThumb(ex)}<div class="lbody"><div class="ltitle">${esc(ex.name)}</div><div class="lsub">${esc(ex.category||'')}</div></div></div>`).join('')}
    <div class="spacer"></div><button class="btn btn-accent btn-block" onclick="closeModal();editExercise()">${ic('plus','sm')} Neue Übung anlegen</button>`);
}
function addEntry(exId){
  const ex=exById(exId);if(!ex)return;let lastSets=null;
  DB.workouts.slice().sort((a,b)=>b.date.localeCompare(a.date)).some(w=>{const e=w.entries.find(x=>x.exId===exId);if(e){lastSets=e.sets;return true;}return false;});
  const sets=lastSets&&lastSets.length?lastSets.map(s=>({w:s.w,reps:s.reps,rpe:''})):[{w:'',reps:'',rpe:''}];
  draft.entries.push({exId,exName:ex.name,sets});closeModal();renderLog();
}
function addSet(i){const last=draft.entries[i].sets.slice(-1)[0]||{w:'',reps:'',rpe:''};draft.entries[i].sets.push({w:last.w,reps:last.reps,rpe:''});renderLog();}
function rmEntry(i){draft.entries.splice(i,1);renderLog();}
function doneSet(i,j){startRest();toast(`Satz ${j+1} erledigt`);}
function cancelWorkout(){if(confirm('Training verwerfen?')){stopClock();draft=null;stopRest();go('dash');}}
function stopClock(){if(clockTimer){clearInterval(clockTimer);clockTimer=null;}}

function finishWorkout(){
  const entries=draft.entries.filter(e=>e.sets.some(s=>s.w||s.reps));
  if(!entries.length){toast('Mindestens einen Satz eintragen');return;}
  let duration=draft.duration;if(!duration&&draft.startTs)duration=Math.max(1,Math.round(elapsedSec()/60));
  const w={id:uid(),date:draft.date,duration:duration||'',notes:draft.notes,entries};
  DB.workouts.push(w);const prs=detectPRs(w);w.prs=prs;
  // mark a matching planned session done
  const pl=DB.planned.find(p=>p.date===w.date&&!p.done);if(pl)pl.done=true;
  save();stopClock();stopRest();draft=null;
  if(prs.length){
    openModal('Neue Rekorde!',`${prs.map(p=>`<div class="card tight flat center"><span class="pr-badge">${ic('trophy','sm')} ${esc(p.type)}</span><h2 style="margin:8px 0 2px">${esc(p.ex)}</h2><div style="font-size:1.3rem;font-weight:800;color:var(--gold)">${esc(p.detail)}</div></div>`).join('')}<button class="btn btn-primary btn-block" onclick="closeModal();go('dash')">Stark, weiter!</button>`);
  }else{toast('Training gespeichert');go('dash');}
}

/* ---------- REST TIMER ---------- */
function startRest(sec){
  sec=sec||DB.settings.restSec||120;
  rest.total=sec;rest.end=Date.now()+sec*1000;
  if(rest.timer)clearInterval(rest.timer);
  rest.timer=setInterval(tickRest,250);renderRest();
}
function tickRest(){
  const left=Math.round((rest.end-Date.now())/1000);
  if(left<=0){stopRest();beep();toast('Pause vorbei – nächster Satz!');return;}
  renderRest();
}
function renderRest(){
  const left=Math.max(0,Math.round((rest.end-Date.now())/1000));
  $('#restRoot').innerHTML=`<div id="restBar">
    <div class="row">${ic('timer')}<div><div style="font-size:.72rem;opacity:.85">Satzpause</div><div class="rt">${fmtClock(left)}</div></div></div>
    <div class="row">
      <button class="btn-sm" onclick="addRest(30)">+30s</button>
      <button class="btn-sm" onclick="stopRest()">Überspringen</button>
    </div></div>`;
}
function addRest(s){rest.end+=s*1000;renderRest();}
function stopRest(){if(rest.timer){clearInterval(rest.timer);rest.timer=null;}$('#restRoot').innerHTML='';}
function beep(){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(.001,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.4,ctx.currentTime+.02);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);o.start();o.stop(ctx.currentTime+.5);}catch(e){}}

function openWorkout(id){
  const w=DB.workouts.find(x=>x.id===id);if(!w)return;
  openModal('Training '+fmtDate(w.date),`
    <div class="muted small">${w.duration?w.duration+' Min · ':''}${Math.round(workoutVol(w))} ${U()} Volumen</div>
    ${w.entries.map(e=>`<div class="card tight flat"><strong>${esc(e.exName)}</strong>
      <table><thead><tr><th>Satz</th><th class="num">${U()}</th><th class="num">Wdh</th><th class="num">RPE</th></tr></thead>
      <tbody>${e.sets.map((s,j)=>`<tr><td>${j+1}</td><td class="num">${esc(s.w)}</td><td class="num">${esc(s.reps)}</td><td class="num">${esc(s.rpe||'–')}</td></tr>`).join('')}</tbody></table></div>`).join('')}
    ${w.notes?`<div class="card tight flat small">${esc(w.notes)}</div>`:''}
    <button class="btn btn-danger btn-block" onclick="delWorkout('${id}')">${ic('trash','sm')} Löschen</button>`);
}
function delWorkout(id){if(!confirm('Training löschen?'))return;DB.workouts=DB.workouts.filter(w=>w.id!==id);save();closeModal();render();toast('Gelöscht');}

/* ===================================================================
   CALENDAR — view what was trained + plan sessions
   =================================================================== */
let calCur=new Date(); calCur.setDate(1);
function viewCalendar(){
  const y=calCur.getFullYear(),m=calCur.getMonth();
  const first=new Date(y,m,1),start=(first.getDay()+6)%7,days=new Date(y,m+1,0).getDate();
  const monLabel=calCur.toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  const byDate={};DB.workouts.forEach(w=>{(byDate[w.date]=byDate[w.date]||[]).push(w);});
  const plannedBy={};DB.planned.forEach(p=>{if(!p.done)(plannedBy[p.date]=plannedBy[p.date]||[]).push(p);});
  const tISO=todayISO();
  let cells='';
  for(let i=0;i<start;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const done=byDate[iso]||[],plan=plannedBy[iso]||[];
    cells+=`<div class="cal-cell ${iso===tISO?'today':''} ${done.length?'has':''}" onclick="openDay('${iso}')">
      <span class="cd">${d}</span>
      <div class="dots">${done.map(()=>'<span class="cdot"></span>').join('')}${plan.map(()=>'<span class="planned"></span>').join('')}</div></div>`;
  }
  const dows=['Mo','Di','Mi','Do','Fr','Sa','So'];
  view().innerHTML=`
    <div class="between" style="margin-bottom:10px"><h1 style="margin:0">Kalender</h1>
      <button class="btn btn-primary btn-sm" onclick="planSession()">${ic('plus','sm')} Planen</button></div>
    <div class="card">
      <div class="cal-head"><button class="btn-ghost iconbtn" onclick="calMove(-1)">${ic('left')}</button>
        <strong>${monLabel}</strong><button class="btn-ghost iconbtn" onclick="calMove(1)">${ic('right')}</button></div>
      <div class="cal-grid">${dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>
      <div class="legend"><span><span class="dot" style="background:var(--accent2)"></span>Trainiert</span><span><span class="dot" style="background:var(--gold)"></span>Geplant</span></div>
    </div>
    ${upcomingHTML()}`;
}
function calMove(n){calCur.setMonth(calCur.getMonth()+n);viewCalendar();}
function upcomingHTML(){
  const up=DB.planned.filter(p=>!p.done&&p.date>=todayISO()).sort((a,b)=>a.date.localeCompare(b.date));
  if(!up.length)return '';
  return `<div class="section-h"><h2>Geplante Trainings</h2></div>${up.map(p=>`<div class="litem" onclick="openDay('${p.date}')">
    <div class="thumb">${ic('calendar')}</div><div class="lbody"><div class="ltitle">${esc(p.planName||'Training')}</div><div class="lsub">${fmtWD(p.date)}${p.note?' · '+esc(p.note):''}</div></div>${ic('chevron','sm')}</div>`).join('')}`;
}
function openDay(iso){
  const done=DB.workouts.filter(w=>w.date===iso);
  const plan=DB.planned.filter(p=>p.date===iso&&!p.done);
  openModal(fmtWD(iso),`
    ${done.length?`<h4>Absolviert</h4>${done.map(w=>`<div class="card tight flat" style="cursor:pointer" onclick="closeModal();openWorkout('${w.id}')"><div class="between"><strong>${w.entries.map(e=>esc(e.exName)).join(', ')||'Training'}</strong><span class="muted small">${Math.round(workoutVol(w))} ${U()}</span></div></div>`).join('')}`:''}
    ${plan.length?`<h4>Geplant</h4>${plan.map(p=>`<div class="card tight flat"><div class="between"><div><strong>${esc(p.planName||'Training')}</strong>${p.note?`<div class="muted small">${esc(p.note)}</div>`:''}</div><button class="btn-ghost muted" onclick="delPlanned('${p.id}')">${ic('trash','sm')}</button></div>
      ${p.planId?`<button class="btn btn-accent btn-sm btn-block" style="margin-top:8px" onclick="closeModal();startFromPlan('${p.planId}','${iso}')">${ic('play','sm')} Jetzt starten</button>`:''}</div>`).join('')}`:''}
    ${!done.length&&!plan.length?`<p class="muted center">Nichts an diesem Tag.</p>`:''}
    <div class="spacer"></div><button class="btn btn-outline btn-block" onclick="planSession('${iso}')">${ic('plus','sm')} Training planen</button>`);
}
function planSession(iso){
  openModal('Training planen',`
    <label>Datum</label><input type="date" id="pl_date" value="${iso||todayISO()}">
    <label>Plan (optional)</label><select id="pl_plan"><option value="">— freies Training —</option>${DB.plans.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select>
    <label>Notiz</label><input id="pl_note" placeholder="z. B. Fokus Beine">
    <div class="spacer"></div><button class="btn btn-primary btn-block" onclick="savePlanned()">Eintragen</button>`);
}
function savePlanned(){
  const date=$('#pl_date').value,planId=$('#pl_plan').value;
  const plan=DB.plans.find(p=>p.id===planId);
  DB.planned.push({id:uid(),date,planId:planId||'',planName:plan?plan.name:'',note:$('#pl_note').value.trim(),done:false});
  save();closeModal();viewCalendar();toast('Geplant');
}
function delPlanned(id){DB.planned=DB.planned.filter(p=>p.id!==id);save();closeModal();viewCalendar();}

/* ===================================================================
   STATS
   =================================================================== */
let statRange=90;
function viewStats(){
  const cut=isoOf(new Date(Date.now()-statRange*864e5));
  const ws=DB.workouts.filter(w=>w.date>=cut);
  const totalVol=ws.reduce((a,w)=>a+workoutVol(w),0),totalTime=ws.reduce((a,w)=>a+(parseInt(w.duration)||0),0);
  const volSeries=DB.workouts.slice().sort((a,b)=>a.date.localeCompare(b.date)).filter(w=>w.date>=cut).map(w=>({x:fmtShort(w.date),y:Math.round(workoutVol(w))}));
  const muscle={};ws.forEach(w=>w.entries.forEach(e=>{const ex=exById(e.exId);const c=(ex&&ex.category)||'Sonstige';muscle[c]=(muscle[c]||0)+entryVol(e);}));
  const mtot=Object.values(muscle).reduce((a,b)=>a+b,0)||1,mrows=Object.entries(muscle).sort((a,b)=>b[1]-a[1]);
  const weeks=weeklyCounts(8);
  view().innerHTML=`
    <h1>Analyse</h1>
    <div class="chips">${[[30,'30 T'],[90,'90 T'],[365,'1 J'],[99999,'Alles']].map(([d,l])=>`<span class="chip ${statRange===d?'active':''}" onclick="statRange=${d};viewStats()">${l}</span>`).join('')}</div>
    <div class="grid g3"><div class="stat"><div class="n">${ws.length}</div><div class="l">Trainings</div></div>
      <div class="stat"><div class="n">${kshort(totalVol)}</div><div class="l">Volumen (${U()})</div></div>
      <div class="stat"><div class="n">${totalTime}</div><div class="l">Minuten</div></div></div>
    <div class="card"><h3>Trainingsvolumen</h3>${lineChart(volSeries,{color:'var(--accent2)',label:'Volumen/Einheit'})}</div>
    <div class="card"><h3>Trainings pro Woche</h3><div class="bars">${weeks.map(wk=>{const mx=Math.max(...weeks.map(x=>x.n),1);return `<div class="bar-row"><div class="bl">${wk.label}</div><div class="bar-track"><div class="bar-fill" style="width:${wk.n/mx*100}%"></div></div><div style="width:22px;text-align:right">${wk.n}</div></div>`;}).join('')}</div></div>
    <div class="card"><h3>Muskelgruppen-Verteilung</h3>${mrows.length?`<div class="bars">${mrows.map(([c,v])=>`<div class="bar-row"><div class="bl">${esc(c)}</div><div class="bar-track"><div class="bar-fill" style="width:${v/mtot*100}%;background:var(--accent2)"></div></div><div style="width:40px;text-align:right">${Math.round(v/mtot*100)}%</div></div>`).join('')}</div>`:'<div class="empty small">Noch keine Daten</div>'}</div>
    <div class="card"><h3>Alle Bestleistungen</h3>${prTable()}</div>`;
}
function weeklyCounts(n){const out=[],now=new Date(),day=(now.getDay()+6)%7,mon=new Date(now);mon.setDate(now.getDate()-day);mon.setHours(0,0,0,0);
  for(let i=n-1;i>=0;i--){const s=new Date(mon);s.setDate(mon.getDate()-i*7);const e=new Date(s);e.setDate(s.getDate()+7);
    const cnt=DB.workouts.filter(w=>w.date>=isoOf(s)&&w.date<isoOf(e)).length;out.push({label:`${s.getDate()}.${s.getMonth()+1}.`,n:cnt});}return out;}
function prTable(){
  const rows=DB.exercises.map(ex=>({ex,st:exStats(ex.id)})).filter(r=>r.st.sessions>0).sort((a,b)=>b.st.maxW-a.st.maxW);
  if(!rows.length)return '<div class="empty small">Noch keine Daten</div>';
  return `<table><thead><tr><th>Übung</th><th class="num">Max ${U()}</th><th class="num">Max Wdh</th><th class="num">1RM</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.ex.name)}</td><td class="num">${r.st.maxW||'–'}</td><td class="num">${r.st.maxReps||'–'}</td><td class="num">${r.st.maxE1||'–'}</td></tr>`).join('')}</tbody></table>`;
}

/* ===================================================================
   BODY — bodyweight + measurements, self-entered, with charts
   =================================================================== */
function viewBody(){
  const bw=DB.bodyweight.slice().sort((a,b)=>a.date.localeCompare(b.date));
  const last=bw[bw.length-1],first=bw[0];
  const diff=(last&&first)?round(last.value-first.value):0;
  const ms=DB.measures.slice().sort((a,b)=>a.date.localeCompare(b.date));
  view().innerHTML=`
    <h1>Körper</h1>
    <div class="card">
      <div class="between"><h3 style="margin:0">Körpergewicht</h3>
        <button class="btn btn-primary btn-sm" onclick="addWeight()">${ic('plus','sm')} Eintragen</button></div>
      ${bw.length?`<div class="grid g3" style="margin:12px 0">
        <div class="stat"><div class="n">${last.value}</div><div class="l">Aktuell (${U()})</div></div>
        <div class="stat"><div class="n">${diff>0?'+':''}${diff}</div><div class="l">Veränderung</div></div>
        <div class="stat"><div class="n">${bw.length}</div><div class="l">Einträge</div></div></div>
        ${lineChart(bw.map(b=>({x:fmtShort(b.date),y:b.value})),{color:'var(--accent2)',label:'Gewicht',unit:U(),h:180})}
        <div class="divider"></div>
        <div class="small muted">Verlauf</div>
        ${bw.slice().reverse().slice(0,8).map(b=>`<div class="between" style="padding:6px 0;border-bottom:1px solid var(--border)"><span>${fmtDate(b.date)}</span><span class="row"><strong>${b.value} ${U()}</strong><button class="btn-ghost muted" style="padding:2px 6px" onclick="delWeight('${b.date}')">${ic('x','sm')}</button></span></div>`).join('')}`
        :`<div class="empty"><div class="ei">${ic('scale','lg')}</div>Noch kein Gewicht erfasst.</div>`}
    </div>

    <div class="card">
      <div class="between"><h3 style="margin:0">Körpermaße</h3>
        <button class="btn btn-primary btn-sm" onclick="addMeasure()">${ic('plus','sm')} Eintragen</button></div>
      ${ms.length?`<table style="margin-top:10px"><thead><tr><th>Datum</th><th class="num">Brust</th><th class="num">Taille</th><th class="num">Arm</th><th class="num">Bein</th></tr></thead>
        <tbody>${ms.slice().reverse().slice(0,10).map(m=>`<tr><td>${fmtShort(m.date)}</td><td class="num">${m.chest||'–'}</td><td class="num">${m.waist||'–'}</td><td class="num">${m.arm||'–'}</td><td class="num">${m.thigh||'–'}</td></tr>`).join('')}</tbody></table>
        <p class="muted small" style="margin-top:6px">Angaben in cm</p>`
        :`<div class="empty"><div class="ei">${ic('ruler','lg')}</div>Noch keine Maße erfasst.</div>`}
    </div>`;
}
function addWeight(){
  openModal('Gewicht eintragen',`<label>Datum</label><input type="date" id="bw_date" value="${todayISO()}">
    <label>Körpergewicht (${U()})</label><input inputmode="decimal" id="bw_val" placeholder="z. B. 82.5" autofocus>
    <div class="spacer"></div><button class="btn btn-primary btn-block" onclick="saveWeight()">Speichern</button>`);
}
function saveWeight(){
  const date=$('#bw_date').value,val=parseFloat($('#bw_val').value);
  if(!val){toast('Bitte Gewicht eingeben');return;}
  DB.bodyweight=DB.bodyweight.filter(b=>b.date!==date);DB.bodyweight.push({date,value:round(val,1)});
  save();closeModal();viewBody();toast('Gespeichert');
}
function delWeight(date){DB.bodyweight=DB.bodyweight.filter(b=>b.date!==date);save();viewBody();}
function addMeasure(){
  openModal('Maße eintragen',`<label>Datum</label><input type="date" id="m_date" value="${todayISO()}">
    <div class="frow"><div><label>Brust (cm)</label><input inputmode="decimal" id="m_chest"></div><div><label>Taille (cm)</label><input inputmode="decimal" id="m_waist"></div></div>
    <div class="frow"><div><label>Hüfte (cm)</label><input inputmode="decimal" id="m_hips"></div><div><label>Arm (cm)</label><input inputmode="decimal" id="m_arm"></div></div>
    <label>Oberschenkel (cm)</label><input inputmode="decimal" id="m_thigh">
    <div class="spacer"></div><button class="btn btn-primary btn-block" onclick="saveMeasure()">Speichern</button>`);
}
function saveMeasure(){
  const date=$('#m_date').value;
  const rec={date,chest:$('#m_chest').value,waist:$('#m_waist').value,hips:$('#m_hips').value,arm:$('#m_arm').value,thigh:$('#m_thigh').value};
  if(!rec.chest&&!rec.waist&&!rec.hips&&!rec.arm&&!rec.thigh){toast('Mindestens einen Wert eingeben');return;}
  DB.measures=DB.measures.filter(m=>m.date!==date);DB.measures.push(rec);
  save();closeModal();viewBody();toast('Gespeichert');
}

/* ===================================================================
   PLANS
   =================================================================== */
function viewPlans(){
  view().innerHTML=`<div class="between"><h1 style="margin:0">Trainingspläne</h1>
    <button class="btn btn-primary btn-sm" onclick="editPlan()">${ic('plus','sm')} Neu</button></div>
    <div class="spacer"></div>
    ${DB.plans.length?DB.plans.map(p=>`<div class="litem" onclick="openPlan('${p.id}')"><div class="thumb">${ic('list')}</div>
      <div class="lbody"><div class="ltitle">${esc(p.name)}</div><div class="lsub">${esc(p.type||'')} · ${p.items.length} Übungen</div></div>${ic('chevron','sm')}</div>`).join('')
      :`<div class="empty"><div class="ei">${ic('list','lg')}</div>Noch keine Pläne.<br>Erstelle z. B. Push / Pull / Legs.</div>`}`;
}
function editPlan(id){
  const p=id?DB.plans.find(x=>x.id===id):{name:'',type:'',items:[]};
  window._tmpPlan={...p,id:id||'',items:p.items.map(i=>({...i}))};
  drawPlanModal();
}
function drawPlanModal(){
  const t=window._tmpPlan;
  openModal(t.id?'Plan bearbeiten':'Neuer Plan',`
    <label>Name *</label><input id="p_name" value="${esc(t.name)}" placeholder="z. B. Push Day" oninput="window._tmpPlan.name=this.value">
    <label>Typ</label><select id="p_type" onchange="window._tmpPlan.type=this.value">${['','Push','Pull','Legs','Oberkörper','Unterkörper','Ganzkörper','Eigene'].map(x=>`<option ${t.type===x?'selected':''}>${x}</option>`).join('')}</select>
    <label>Übungen</label><div id="planItems">${planItemsHTML()}</div>
    <button type="button" class="btn btn-outline btn-block btn-sm" onclick="planAddItem()">${ic('plus','sm')} Übung</button>
    <div class="spacer"></div><button class="btn btn-primary btn-block" onclick="savePlan()">Speichern</button>
    ${t.id?`<div class="spacer"></div><button class="btn btn-danger btn-block" onclick="delPlan('${t.id}')">${ic('trash','sm')} Löschen</button>`:''}`);
}
function planItemsHTML(){
  const t=window._tmpPlan;
  return t.items.map((it,i)=>`<div class="card tight flat"><div class="between"><strong>${esc(it.exName)}</strong><button type="button" class="btn-ghost muted" onclick="planRmItem(${i})">${ic('x','sm')}</button></div>
    <div class="frow"><div><label>Ziel-Sätze</label><input inputmode="numeric" value="${it.targetSets||''}" oninput="window._tmpPlan.items[${i}].targetSets=this.value"></div>
    <div><label>Ziel-Wdh</label><input value="${it.targetReps||''}" placeholder="8-12" oninput="window._tmpPlan.items[${i}].targetReps=this.value"></div></div></div>`).join('');
}
function planAddItem(){
  const list=DB.exercises.slice().sort((a,b)=>a.name.localeCompare(b.name));
  openModal('Übung wählen',list.length?list.map(ex=>`<div class="litem" onclick="planPick('${ex.id}')">${exThumb(ex)}<div class="lbody"><div class="ltitle">${esc(ex.name)}</div></div></div>`).join(''):`<div class="empty">Erst Übungen anlegen.</div>`);
}
function planPick(exId){const ex=exById(exId);window._tmpPlan.items.push({exId,exName:ex.name,targetSets:'3',targetReps:'8-12'});drawPlanModal();}
function planRmItem(i){window._tmpPlan.items.splice(i,1);$('#planItems').innerHTML=planItemsHTML();}
function savePlan(){
  const t=window._tmpPlan;if(!t.name.trim()){toast('Name fehlt');return;}
  const data={name:t.name.trim(),type:t.type,items:t.items};
  if(t.id)Object.assign(DB.plans.find(x=>x.id===t.id),data);else DB.plans.push({id:uid(),...data});
  save();closeModal();viewPlans();toast('Plan gespeichert');
}
function delPlan(id){if(!confirm('Plan löschen?'))return;DB.plans=DB.plans.filter(p=>p.id!==id);save();closeModal();viewPlans();}
function openPlan(id){
  const p=DB.plans.find(x=>x.id===id);if(!p)return;
  openModal(p.name,`<span class="tag a">${esc(p.type||'Plan')}</span>
    ${p.items.length?`<table><thead><tr><th>Übung</th><th class="num">Sätze</th><th class="num">Wdh</th></tr></thead><tbody>${p.items.map(it=>`<tr><td>${esc(it.exName)}</td><td class="num">${esc(it.targetSets||'–')}</td><td class="num">${esc(it.targetReps||'–')}</td></tr>`).join('')}</tbody></table>`:'<p class="muted">Keine Übungen.</p>'}
    <div class="spacer"></div><button class="btn btn-accent btn-block" onclick="startFromPlan('${id}')">${ic('play','sm')} Training mit Plan starten</button>
    <div class="spacer"></div><button class="btn btn-outline btn-block" onclick="editPlan('${id}')">${ic('edit','sm')} Bearbeiten</button>`);
}
function startFromPlan(id,date){
  const p=DB.plans.find(x=>x.id===id);if(!p)return;
  draft={date:date||todayISO(),duration:'',notes:'',startTs:Date.now(),entries:p.items.map(it=>{
    const n=parseInt(it.targetSets)||3,sets=[];for(let k=0;k<n;k++)sets.push({w:'',reps:'',rpe:''});
    return {exId:it.exId,exName:it.exName,sets};})};
  closeModal();stopClock();go('log');
}

/* ===================================================================
   SETTINGS / PROFILE / EXPORT
   =================================================================== */
function viewSettings(){
  const p=ACCOUNT.profile||{};
  view().innerHTML=`<h1>Einstellungen</h1>
    <div class="card"><h3>Profil</h3>
      <div class="row" style="margin:10px 0">${p.photo?`<img class="avatar" style="width:54px;height:54px" src="${p.photo}">`:`<div class="avatar" style="width:54px;height:54px;font-size:1.1rem">${initials(p.name||ACCOUNT.name)}</div>`}
        <div><div style="font-weight:700">${esc(p.name||ACCOUNT.name)}</div><div class="muted small">${p.weight?p.weight+' '+U():''}${p.height?' · '+p.height+' cm':''}${p.age?' · '+p.age+' J':''}</div></div></div>
      <button class="btn btn-block" onclick="editProfile()">${ic('edit','sm')} Profil bearbeiten</button></div>

    <div class="card"><h3>Darstellung</h3>
      <button class="btn btn-block" onclick="toggleTheme()">${ic(ROOT.theme==='light'?'moon':'sun','sm')} ${ROOT.theme==='light'?'Dunkler Modus':'Heller Modus'}</button></div>

    <div class="card"><h3>Training</h3>
      <div class="frow"><div><label>Einheit</label><select onchange="DB.settings.unit=this.value;save();render()"><option value="kg" ${U()==='kg'?'selected':''}>kg</option><option value="lb" ${U()==='lb'?'selected':''}>lb</option></select></div>
        <div><label>Satzpause (Sek)</label><input type="number" inputmode="numeric" value="${DB.settings.restSec}" onchange="DB.settings.restSec=parseInt(this.value)||120;save()"></div></div>
      <label>Wochenziel (Trainings)</label><input type="number" inputmode="numeric" value="${DB.settings.weekGoal}" onchange="DB.settings.weekGoal=parseInt(this.value)||4;save()"></div>

    <div class="card"><h3>Daten & Backup</h3>
      <div class="btn-row"><button class="btn btn-outline" onclick="exportCSV()">${ic('download','sm')} CSV</button>
        <button class="btn btn-outline" onclick="exportJSON()">${ic('download','sm')} Backup</button></div>
      <button type="button" class="btn btn-outline btn-block" style="margin-top:10px" onclick="$('#imp').click()">${ic('upload','sm')} Backup importieren</button>
      <input type="file" accept="application/json,.json" id="imp" class="hidden" onchange="importJSON(this)">
      <div class="divider"></div>
      <button class="btn btn-danger btn-block" onclick="resetData()">${ic('trash','sm')} Alle meine Daten löschen</button></div>

    <p class="center small muted">Atlas · Konto „${esc(ACCOUNT.name)}" · Daten nur auf diesem Gerät</p>`;
}
function editProfile(){
  const p=ACCOUNT.profile||{};
  openModal('Profil',`${p.photo?`<div class="center"><img src="${p.photo}" style="width:90px;height:90px;border-radius:50%;object-fit:cover"></div>`:''}
    <button type="button" class="btn btn-outline btn-block btn-sm" onclick="$('#pf_photo').click()">${ic('camera','sm')} Profilbild wählen</button>
    <input type="file" accept="image/*" id="pf_photo" class="hidden" onchange="setProfilePhoto(this)">
    <label>Name</label><input id="pf_name" value="${esc(p.name||ACCOUNT.name)}">
    <div class="frow"><div><label>Gewicht (${U()})</label><input inputmode="decimal" id="pf_weight" value="${esc(p.weight||'')}"></div>
      <div><label>Größe (cm)</label><input inputmode="numeric" id="pf_height" value="${esc(p.height||'')}"></div></div>
    <label>Alter</label><input inputmode="numeric" id="pf_age" value="${esc(p.age||'')}">
    <div class="spacer"></div><button class="btn btn-primary btn-block" onclick="saveProfile()">Speichern</button>`);
}
async function setProfilePhoto(input){if(!input.files[0])return;ACCOUNT.profile.photo=await fileToThumb(input.files[0],400);saveRoot();editProfile();}
function saveProfile(){
  ACCOUNT.profile=Object.assign(ACCOUNT.profile||{},{name:$('#pf_name').value.trim(),weight:$('#pf_weight').value,height:$('#pf_height').value,age:$('#pf_age').value});
  saveRoot();closeModal();render();toast('Profil gespeichert');
}
function download(name,content,type){const b=new Blob([content],{type}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function exportJSON(){download('atlas-'+ACCOUNT.name+'-'+todayISO()+'.json',JSON.stringify({profile:ACCOUNT.profile,data:DB},null,2),'application/json');toast('Backup erstellt');}
function exportCSV(){
  const rows=[['Datum','Übung','Kategorie','Satz','Gewicht','Wdh','RPE','Dauer','Notiz']];
  DB.workouts.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(w=>w.entries.forEach(e=>{const ex=exById(e.exId);e.sets.forEach((s,j)=>rows.push([w.date,e.exName,(ex&&ex.category)||'',j+1,s.w,s.reps,s.rpe||'',w.duration||'',(w.notes||'').replace(/\n/g,' ')]));}));
  const csv=rows.map(r=>r.map(c=>{c=String(c);return /[";,\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(';')).join('\n');
  download('atlas-'+todayISO()+'.csv','\ufeff'+csv,'text/csv');toast('CSV erstellt');
}
function importJSON(input){
  if(!input.files[0])return;const fr=new FileReader();
  fr.onload=()=>{try{const d=JSON.parse(fr.result);const data=d.data||d;if(!data.exercises&&!data.workouts)throw 0;
    if(!confirm('Backup importieren? Deine aktuellen Daten werden ersetzt.'))return;
    DB=Object.assign(blankData(),data);if(d.profile)ACCOUNT.profile=d.profile;ACCOUNT.data=DB;saveRoot();render();toast('Importiert');
  }catch(e){toast('Ungültige Datei');}};fr.readAsText(input.files[0]);
}
function resetData(){if(!confirm('Wirklich ALLE Trainingsdaten dieses Kontos löschen?'))return;if(!confirm('Sicher? Lege vorher ein Backup an!'))return;DB=blankData();ACCOUNT.data=DB;saveRoot();render();toast('Zurückgesetzt');}

/* ===================================================================
   MODAL + BOOT
   =================================================================== */
function openModal(title,html){$('#modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h2>${esc(title)}</h2><button class="xbtn" onclick="closeModal()">${ic('x')}</button></div>${html}</div></div>`;}
function closeModal(){$('#modalRoot').innerHTML='';}

applyTheme();
loadSession();
if(ACCOUNT){enterApp();}else{showAuth();}


</script>
</body>
</html>
