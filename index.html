<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<title>GymTrack</title>
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22GymTrack%22%2C%22short_name%22%3A%22GymTrack%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230f1115%22%2C%22theme_color%22%3A%22%230f1115%22%2C%22icons%22%3A%5B%5D%7D">
<style>
:root{
  --bg:#0f1115; --surface:#181b22; --surface2:#212530; --border:#2c313d;
  --text:#e8eaed; --muted:#9aa3b2; --accent:#4f8cff; --accent2:#36c2a4;
  --gold:#f5c542; --danger:#ff5d5d; --radius:14px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px; line-height:1.45; padding-bottom:calc(76px + var(--safe-b));
}
h1,h2,h3{margin:0 0 .5em}
h1{font-size:1.4rem} h2{font-size:1.15rem} h3{font-size:1rem}
a{color:var(--accent)}
.app{max-width:780px;margin:0 auto;padding:16px 16px 0}
.hidden{display:none!important}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.topbar .title{font-weight:700;font-size:1.25rem;letter-spacing:.3px}
.topbar .title span{color:var(--accent)}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.card.tight{padding:12px}
.grid{display:grid;gap:12px}
.grid.two{grid-template-columns:1fr 1fr}
.grid.three{grid-template-columns:repeat(3,1fr)}
@media(max-width:520px){.grid.three{grid-template-columns:1fr 1fr}}

/* Stat tiles */
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat .num{font-size:1.5rem;font-weight:700;color:var(--accent)}
.stat .lbl{font-size:.78rem;color:var(--muted);margin-top:2px}

/* Buttons */
button,.btn{
  font:inherit;cursor:pointer;border:none;border-radius:12px;
  padding:14px 16px;background:var(--surface2);color:var(--text);
  border:1px solid var(--border);transition:.12s;font-weight:600;
}
button:active,.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent{background:var(--accent2);color:#06241d;border-color:var(--accent2)}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn-ghost{background:transparent}
.btn-block{display:block;width:100%}
.btn-lg{padding:18px;font-size:1.05rem}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn-row>*{flex:1}
.icon-btn{padding:10px 12px;font-size:1rem}

/* Forms */
label{display:block;font-size:.8rem;color:var(--muted);margin:10px 0 4px}
input,select,textarea{
  width:100%;font:inherit;padding:13px 12px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{min-height:70px;resize:vertical}
.field-row{display:flex;gap:10px}
.field-row>div{flex:1}

/* Chips / tags */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0}
.chip{padding:7px 12px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);font-size:.82rem;cursor:pointer}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tag{display:inline-block;padding:3px 9px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);font-size:.72rem;color:var(--muted);margin:2px 4px 2px 0}
.tag.cat{color:var(--accent2);border-color:var(--accent2)}

/* List items */
.list-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;cursor:pointer}
.list-item:active{background:var(--surface2)}
.thumb{width:54px;height:54px;border-radius:10px;object-fit:cover;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--muted)}
.li-body{flex:1;min-width:0}
.li-title{font-weight:600}
.li-sub{font-size:.8rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:.92rem}
th,td{padding:9px 6px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;font-size:.78rem}
td.num,th.num{text-align:right}

/* Bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-b);z-index:50}
.nav button{flex:1;background:none;border:none;border-radius:0;padding:10px 4px;color:var(--muted);font-size:.68rem;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav button .ico{font-size:1.25rem}
.nav button.active{color:var(--accent)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0}
.modal{background:var(--surface);width:100%;max-width:780px;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:18px 16px calc(20px + var(--safe-b));border:1px solid var(--border)}
@media(min-width:600px){.modal-bg{align-items:center;padding:20px}.modal{border-radius:18px}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.modal-head h2{margin:0}
.close-x{background:none;border:none;color:var(--muted);font-size:1.5rem;padding:4px 10px}

/* Misc */
.muted{color:var(--muted)} .small{font-size:.82rem}
.center{text-align:center}
.empty{text-align:center;color:var(--muted);padding:40px 16px}
.empty .big{font-size:2.4rem;margin-bottom:8px}
.pr-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(245,197,66,.12);color:var(--gold);border:1px solid rgba(245,197,66,.4);border-radius:999px;padding:4px 11px;font-size:.78rem;font-weight:600}
.divider{height:1px;background:var(--border);margin:14px 0}
.spacer{height:8px}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--accent);color:var(--text);padding:12px 18px;border-radius:12px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.4);font-weight:600;max-width:90%}
.set-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.set-row .sn{width:26px;text-align:center;color:var(--muted);font-weight:700}
.set-row input{padding:11px 8px;text-align:center}
.section-title{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px}
.section-title h2{margin:0}
.bars{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:.85rem}
.bar-row .bl{width:90px;flex-shrink:0;color:var(--muted)}
.bar-track{flex:1;height:18px;background:var(--surface2);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);border-radius:6px}
svg.chart{width:100%;height:auto;display:block}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:.78rem;color:var(--muted);margin-top:8px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">Gym<span>Track</span></div>
    <button class="icon-btn" id="profileBtn" title="Profil">👤</button>
  </div>
  <div id="view"></div>
</div>

<nav class="nav" id="nav"></nav>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
/* ============ GymTrack — Single-User local PWA ============ */
const DB_KEY = 'gymtrack_v1';
const CATEGORIES = ['Brust','Rücken','Beine','Schultern','Arme','Bauch','Cardio','Ganzkörper'];
const MUSCLES = ['Brust','Oberer Rücken','Latissimus','Bizeps','Trizeps','Schultern','Quadrizeps','Beinbeuger','Gesäß','Waden','Bauch','Unterer Rücken','Unterarme'];
const DIFFICULTY = ['Anfänger','Mittel','Fortgeschritten'];

/* ---------- Persistence ---------- */
function blankDB(){
  return {
    profile:{name:'',weight:'',height:'',age:'',photo:''},
    exercises:[],   // {id,name,photos:[],cover,category,desc,notes,maker,target,secondary:[],difficulty}
    workouts:[],    // {id,date,duration,notes,entries:[{exId,exName,sets:[{w,reps,rpe}]}]}
    plans:[],       // {id,name,type,items:[{exId,exName,targetSets,targetReps}]}
    settings:{unit:'kg'}
  };
}
let DB = load();
function load(){
  try{const r=localStorage.getItem(DB_KEY);if(r)return Object.assign(blankDB(),JSON.parse(r));}catch(e){}
  return blankDB();
}
function save(){localStorage.setItem(DB_KEY,JSON.stringify(DB));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

/* ---------- Helpers ---------- */
const $ = s=>document.querySelector(s);
const view = $('#view');
const U = ()=>DB.settings.unit;
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtDate(d){const x=new Date(d);return x.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDateShort(d){const x=new Date(d);return x.toLocaleDateString('de-DE',{day:'2-digit',month:'short'});}
function todayISO(){return new Date().toISOString().slice(0,10);}
function exById(id){return DB.exercises.find(e=>e.id===id);}
function round(n,d=1){const f=Math.pow(10,d);return Math.round(n*f)/f;}

function toast(msg){
  const r=$('#toastRoot'); r.innerHTML=`<div class="toast">${esc(msg)}</div>`;
  setTimeout(()=>r.innerHTML='',2200);
}

/* ---------- Volume & PR computation ---------- */
function setVolume(s){return (parseFloat(s.w)||0)*(parseInt(s.reps)||0);}
function entryVolume(e){return e.sets.reduce((a,s)=>a+setVolume(s),0);}
function workoutVolume(w){return w.entries.reduce((a,e)=>a+entryVolume(e),0);}
function estimate1RM(w,reps){w=parseFloat(w)||0;reps=parseInt(reps)||0;if(!w||!reps)return 0;return w*(1+reps/30);} // Epley

// Best metrics for an exercise across all history
function exerciseStats(exId){
  let maxW=0,maxReps=0,maxVol=0,maxE1=0,sessions=0,totalVol=0,lastDate=null;
  const series=[]; // per workout: {date,topW,vol,e1rm,reps}
  DB.workouts.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(w=>{
    const e=w.entries.find(x=>x.exId===exId); if(!e)return;
    sessions++; let topW=0,vol=0,bestE1=0,topReps=0;
    e.sets.forEach(s=>{
      const ww=parseFloat(s.w)||0,rr=parseInt(s.reps)||0,e1=estimate1RM(ww,rr);
      if(ww>maxW)maxW=ww; if(rr>maxReps)maxReps=rr; if(e1>maxE1)maxE1=e1;
      if(ww>topW)topW=ww; if(rr>topReps)topReps=rr; if(e1>bestE1)bestE1=e1;
      vol+=ww*rr;
    });
    if(vol>maxVol)maxVol=vol; totalVol+=vol; lastDate=w.date;
    series.push({date:w.date,topW,vol,e1rm:bestE1,reps:topReps});
  });
  return {maxW,maxReps,maxVol,maxE1:round(maxE1),sessions,totalVol,lastDate,series};
}

// Detect PRs for a freshly-saved workout (compare against prior history)
function detectPRs(workout){
  const prs=[];
  workout.entries.forEach(e=>{
    // history BEFORE this workout
    let pMaxW=0,pMaxReps=0,pMaxVol=0;
    DB.workouts.forEach(w=>{
      if(w.id===workout.id)return;
      if(w.date>workout.date)return;
      const pe=w.entries.find(x=>x.exId===e.exId); if(!pe)return;
      let vol=0; pe.sets.forEach(s=>{const ww=parseFloat(s.w)||0,rr=parseInt(s.reps)||0;if(ww>pMaxW)pMaxW=ww;if(rr>pMaxReps)pMaxReps=rr;vol+=ww*rr;});
      if(vol>pMaxVol)pMaxVol=vol;
    });
    let cMaxW=0,cMaxReps=0,cVol=0,bestSet=null;
    e.sets.forEach(s=>{const ww=parseFloat(s.w)||0,rr=parseInt(s.reps)||0;if(ww>cMaxW){cMaxW=ww;bestSet=s;}if(rr>cMaxReps)cMaxReps=rr;cVol+=ww*rr;});
    if(cMaxW>pMaxW && cMaxW>0) prs.push({ex:e.exName,type:'Gewicht',detail:`${cMaxW} ${U()} × ${bestSet?bestSet.reps:''}`});
    else if(cMaxReps>pMaxReps && cMaxReps>0 && pMaxReps>0) prs.push({ex:e.exName,type:'Wiederholungen',detail:`${cMaxReps} Wdh`});
    if(cVol>pMaxVol && pMaxVol>0) prs.push({ex:e.exName,type:'Volumen',detail:`${Math.round(cVol)} ${U()}`});
  });
  return prs;
}

/* ---------- Image handling (downscale to keep storage small) ---------- */
function fileToThumb(file,maxDim=900){
  return new Promise(res=>{
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let {width:w,height:h}=img;
        if(w>maxDim||h>maxDim){const r=Math.min(maxDim/w,maxDim/h);w=Math.round(w*r);h=Math.round(h*r);}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',0.8));
      };
      img.src=fr.result;
    };
    fr.readAsDataURL(file);
  });
}

/* ---------- SVG line chart ---------- */
function lineChart(points,{color='#4f8cff',h=160,fill=true,label=''}={}){
  if(!points.length) return `<div class="empty small">Noch keine Daten</div>`;
  const w=600,pad=30;
  const xs=points.map((_,i)=>i),ys=points.map(p=>p.y);
  const minY=Math.min(...ys),maxY=Math.max(...ys);
  const spanY=(maxY-minY)||1;
  const X=i=>pad+(points.length===1?(w-2*pad)/2:i/(points.length-1)*(w-2*pad));
  const Y=v=>h-pad-((v-minY)/spanY)*(h-2*pad);
  let d='',area='';
  points.forEach((p,i)=>{const x=X(i),y=Y(p.y);d+=(i?'L':'M')+x+' '+y+' ';});
  if(fill){area=`M${X(0)} ${h-pad} `+points.map((p,i)=>`L${X(i)} ${Y(p.y)} `).join('')+`L${X(points.length-1)} ${h-pad} Z`;}
  const dots=points.map((p,i)=>`<circle cx="${X(i)}" cy="${Y(p.y)}" r="3" fill="${color}"/>`).join('');
  const labels=points.map((p,i)=> (points.length<=8 || i%Math.ceil(points.length/6)===0) ?
     `<text x="${X(i)}" y="${h-8}" font-size="11" fill="#9aa3b2" text-anchor="middle">${esc(p.x)}</text>`:'').join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <text x="${pad}" y="14" font-size="11" fill="#9aa3b2">${esc(label)} · max ${round(maxY)}</text>
    ${fill?`<path d="${area}" fill="${color}" opacity="0.12"/>`:''}
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2.5"/>
    ${dots}${labels}
  </svg>`;
}

/* ============================ ROUTER ============================ */
let route='dash';
const NAV=[
  {id:'dash',ico:'🏠',label:'Start'},
  {id:'exercises',ico:'🏋️',label:'Übungen'},
  {id:'log',ico:'➕',label:'Training'},
  {id:'stats',ico:'📊',label:'Analyse'},
  {id:'more',ico:'⚙️',label:'Mehr'},
];
function renderNav(){
  $('#nav').innerHTML=NAV.map(n=>`<button class="${route===n.id?'active':''}" onclick="go('${n.id}')"><span class="ico">${n.ico}</span>${n.label}</button>`).join('');
}
function go(r){route=r;render();}
function render(){
  renderNav();
  ({dash:viewDash,exercises:viewExercises,log:viewLog,stats:viewStats,more:viewMore}[route]||viewDash)();
  window.scrollTo(0,0);
}

/* ============================ DASHBOARD ============================ */
function viewDash(){
  const ws=DB.workouts.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const last=ws[0];
  const now=new Date(); const weekAgo=new Date(now-6*864e5).toISOString().slice(0,10);
  const thisWeek=DB.workouts.filter(w=>w.date>=weekAgo);
  const totalVol=DB.workouts.reduce((a,w)=>a+workoutVolume(w),0);
  // favourite exercises (most logged)
  const freq={};DB.workouts.forEach(w=>w.entries.forEach(e=>freq[e.exId]=(freq[e.exId]||0)+1));
  const favs=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([id,n])=>({ex:exById(id),n})).filter(x=>x.ex);
  // recent PRs across history (top weight per exercise reached in last 30 days)
  const recentPRs=computeRecentPRs();

  const greeting = DB.profile.name? `Hi ${esc(DB.profile.name)} 👋`:'Willkommen 👋';
  view.innerHTML=`
    <h1>${greeting}</h1>
    <div class="grid three">
      <div class="stat"><div class="num">${thisWeek.length}</div><div class="lbl">Trainings / Woche</div></div>
      <div class="stat"><div class="num">${DB.workouts.length}</div><div class="lbl">Trainings gesamt</div></div>
      <div class="stat"><div class="num">${kshort(totalVol)}</div><div class="lbl">Volumen gesamt (${U()})</div></div>
    </div>

    <button class="btn btn-primary btn-block btn-lg" onclick="go('log')" style="margin:6px 0 14px">➕ Training starten</button>

    <div class="section-title"><h2>Letztes Training</h2></div>
    ${last? workoutCardHTML(last) : `<div class="card center muted">Noch kein Training erfasst.</div>`}

    <div class="section-title"><h2>🏆 Aktuelle Rekorde</h2></div>
    ${recentPRs.length? `<div class="card tight">${recentPRs.map(p=>`<div style="padding:6px 0;border-bottom:1px solid var(--border)"><span class="pr-badge">🏆 ${esc(p.ex)}</span> &nbsp;<strong>${esc(p.detail)}</strong></div>`).join('')}</div>`
      : `<div class="card center muted">Noch keine Rekorde — leg los!</div>`}

    <div class="section-title"><h2>⭐ Lieblingsübungen</h2></div>
    ${favs.length? favs.map(f=>exListItemHTML(f.ex,`${f.n}× trainiert`)).join('')
      : `<div class="card center muted">Noch keine Daten.</div>`}
  `;
}
function kshort(n){return n>=1000? round(n/1000,1)+'k':Math.round(n);}
function computeRecentPRs(){
  const out=[];
  DB.exercises.forEach(ex=>{
    const st=exerciseStats(ex.id);
    if(st.maxW>0) out.push({exId:ex.id,ex:ex.name,detail:`${st.maxW} ${U()} (Bestgewicht)`,date:st.lastDate});
  });
  return out.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,5);
}
function workoutCardHTML(w){
  const prs = w.prs||[];
  return `<div class="card" onclick="openWorkout('${w.id}')" style="cursor:pointer">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <strong>${fmtDate(w.date)}</strong>
      <span class="muted small">${w.duration?w.duration+' Min · ':''}${Math.round(workoutVolume(w))} ${U()}</span>
    </div>
    <div class="small muted" style="margin-top:6px">${w.entries.map(e=>esc(e.exName)).join(' · ')||'Keine Übungen'}</div>
    ${prs.length?`<div style="margin-top:8px">${prs.map(p=>`<span class="pr-badge" style="margin-right:6px">🏆 ${esc(p.type)}</span>`).join('')}</div>`:''}
  </div>`;
}
function exListItemHTML(ex,sub){
  const img = ex.cover? `<img class="thumb" src="${ex.cover}">` : `<div class="thumb">🏋️</div>`;
  return `<div class="list-item" onclick="openExercise('${ex.id}')">
    ${img}<div class="li-body"><div class="li-title">${esc(ex.name)}</div>
    <div class="li-sub">${esc(sub||ex.category||'')}</div></div><span class="muted">›</span></div>`;
}

/* ============================ EXERCISES ============================ */
let exFilter={cat:'',q:''};
function viewExercises(){
  let list=DB.exercises.slice().sort((a,b)=>a.name.localeCompare(b.name));
  if(exFilter.cat) list=list.filter(e=>e.category===exFilter.cat);
  if(exFilter.q){const q=exFilter.q.toLowerCase();list=list.filter(e=>(e.name+' '+(e.notes||'')+' '+(e.target||'')+' '+(e.secondary||[]).join(' ')).toLowerCase().includes(q));}
  view.innerHTML=`
    <div class="section-title"><h1>Übungen & Maschinen</h1>
      <button class="btn btn-primary icon-btn" onclick="editExercise()">+ Neu</button></div>
    <input placeholder="🔍 Suchen (Name, Notiz, Muskel)" value="${esc(exFilter.q)}" oninput="exFilter.q=this.value;refreshExList()">
    <div class="chips" id="catChips">
      <span class="chip ${exFilter.cat===''?'active':''}" onclick="exFilter.cat='';viewExercises()">Alle</span>
      ${CATEGORIES.map(c=>`<span class="chip ${exFilter.cat===c?'active':''}" onclick="exFilter.cat='${c}';viewExercises()">${c}</span>`).join('')}
    </div>

function entryHTML(e,i){

function pickExercise(){

function addEntry(exId){
  const ex=exById(exId);if(!ex)return;
  // prefill from last time
  let lastSets=null;
  DB.workouts.slice().sort((a,b)=>b.date.localeCompare(a.date)).some(w=>{const e=w.entries.find(x=>x.exId===exId);if(e){lastSets=e.sets;return true;}return false;});
  const sets=lastSets?lastSets.map(s=>({w:s.w,reps:s.reps,rpe:''})):[{w:'',reps:'',rpe:''}];
  draft.entries.push({exId,exName:ex.name,sets});
  closeModal();renderLog();
}
function addSet(i){const last=draft.entries[i].sets.slice(-1)[0]||{w:'',reps:'',rpe:''};draft.entries[i].sets.push({w:last.w,reps:last.reps,rpe:''});renderLog();}

  if(!duration&&draft.startTs){duration=Math.max(1,Math.round((Date.now()-draft.startTs)/60000));}
  const w={id:uid(),date:draft.date,duration:duration||'',notes:draft.notes,entries};

/* ============================ STATS / ANALYSE ============================ */
let statRange=90; // days
function viewStats(){
  const cut=new Date(Date.now()-statRange*864e5).toISOString().slice(0,10);
  const ws=DB.workouts.filter(w=>w.date>=cut);
  const totalVol=ws.reduce((a,w)=>a+workoutVolume(w),0);
  const totalTime=ws.reduce((a,w)=>a+(parseInt(w.duration)||0),0);
  // volume per workout over time
  const volSeries=DB.workouts.slice().sort((a,b)=>a.date.localeCompare(b.date)).filter(w=>w.date>=cut)
    .map(w=>({x:fmtDateShort(w.date),y:Math.round(workoutVolume(w))}));
  // muscle distribution by volume
  const muscle={};
  ws.forEach(w=>w.entries.forEach(e=>{const ex=exById(e.exId);const cat=(ex&&ex.category)||'Sonstige';muscle[cat]=(muscle[cat]||0)+entryVolume(e);}));
  const mtot=Object.values(muscle).reduce((a,b)=>a+b,0)||1;
  const mrows=Object.entries(muscle).sort((a,b)=>b[1]-a[1]);
  // weekly training count (last 8 weeks)
  const weeks=weeklyCounts(8);

  view.innerHTML=`
    <div class="section-title"><h1>Analyse</h1></div>
    <div class="chips">
      ${[[30,'30 Tage'],[90,'90 Tage'],[365,'1 Jahr'],[99999,'Alles']].map(([d,l])=>`<span class="chip ${statRange===d?'active':''}" onclick="statRange=${d};viewStats()">${l}</span>`).join('')}
    </div>
    <div class="grid three">
      <div class="stat"><div class="num">${ws.length}</div><div class="lbl">Trainings</div></div>
      <div class="stat"><div class="num">${kshort(totalVol)}</div><div class="lbl">Volumen (${U()})</div></div>
      <div class="stat"><div class="num">${totalTime}</div><div class="lbl">Minuten</div></div>
    </div>

    <div class="card"><h3>Trainingsvolumen</h3>${lineChart(volSeries,{label:'Volumen/Einheit',color:'#36c2a4'})}</div>

    <div class="card"><h3>Trainings pro Woche</h3>
      <div class="bars">${weeks.map(wk=>{const max=Math.max(...weeks.map(x=>x.n),1);
        return `<div class="bar-row"><div class="bl">${wk.label}</div><div class="bar-track"><div class="bar-fill" style="width:${wk.n/max*100}%"></div></div><div style="width:24px;text-align:right">${wk.n}</div></div>`;}).join('')}</div>
    </div>

    <div class="card"><h3>Muskelgruppen-Verteilung</h3>
      ${mrows.length?`<div class="bars">${mrows.map(([cat,v])=>{
        return `<div class="bar-row"><div class="bl">${esc(cat)}</div><div class="bar-track"><div class="bar-fill" style="width:${v/mtot*100}%;background:var(--accent2)"></div></div><div style="width:42px;text-align:right">${Math.round(v/mtot*100)}%</div></div>`;
      }).join('')}</div>`:'<div class="empty small">Noch keine Daten</div>'}
    </div>

    <div class="card"><h3>🏆 Alle Bestleistungen</h3>
      ${prTableHTML()}
    </div>
  `;
}
function weeklyCounts(n){
  const out=[];const now=new Date();
  // start of current week (Mon)
  const day=(now.getDay()+6)%7; const monday=new Date(now);monday.setDate(now.getDate()-day);monday.setHours(0,0,0,0);
  for(let i=n-1;i>=0;i--){
    const s=new Date(monday);s.setDate(monday.getDate()-i*7);
    const e=new Date(s);e.setDate(s.getDate()+7);
    const si=s.toISOString().slice(0,10),ei=e.toISOString().slice(0,10);
    const cnt=DB.workouts.filter(w=>w.date>=si&&w.date<ei).length;
    out.push({label:`${s.getDate()}.${s.getMonth()+1}.`,n:cnt});
  }
  return out;
}
function prTableHTML(){
  const rows=DB.exercises.map(ex=>({ex,st:exerciseStats(ex.id)})).filter(r=>r.st.sessions>0)
    .sort((a,b)=>b.st.maxW-a.st.maxW);
  if(!rows.length) return '<div class="empty small">Noch keine Trainingsdaten</div>';
  return `<table><thead><tr><th>Übung</th><th class="num">Max ${U()}</th><th class="num">Max Wdh</th><th class="num">1RM</th></tr></thead>
    <tbody>${rows.map(r=>`<tr><td>${esc(r.ex.name)}</td><td class="num">${r.st.maxW||'–'}</td><td class="num">${r.st.maxReps||'–'}</td><td class="num">${r.st.maxE1||'–'}</td></tr>`).join('')}</tbody></table>`;
}

function planAddItem(){
  const list=DB.exercises.slice().sort((a,b)=>a.name.localeCompare(b.name));
  openModal('Übung wählen',list.length?list.map(ex=>`<div class="list-item" onclick="planPick('${ex.id}')"><div class="thumb">🏋️</div><div class="li-body"><div class="li-title">${esc(ex.name)}</div></div></div>`).join(''):'<div class="empty">Erst Übungen anlegen</div>');
}
function planPick(exId){const ex=exById(exId);window._tmpPlan.items.push({exId,exName:ex.name,targetSets:'',targetReps:''});closeModal();editPlanReopen();}
function editPlanReopen(){const tmp=window._tmpPlan;openModalRaw();editPlanFromTmp();}
function editPlanFromTmp(){const tmp=window._tmpPlan;editPlan(tmp.id||undefined);setTimeout(()=>{$('#p_name')&&($('#p_name').value=tmp.name);},0);}
function planRmItem(i){window._tmpPlan.items.splice(i,1);renderPlanItems();}
function savePlan(id){
  const tmp=window._tmpPlan;const name=$('#p_name').value.trim();
  if(!name){toast('Name fehlt');return;}
  const data={name,type:$('#p_type').value,items:tmp.items};
  if(id)Object.assign(DB.plans.find(x=>x.id===id),data);else DB.plans.push({id:uid(),...data});
  save();closeModal();viewMore();toast('Plan gespeichert ✓');
}
function delPlan(id){if(!confirm('Plan löschen?'))return;DB.plans=DB.plans.filter(p=>p.id!==id);save();closeModal();viewMore();}
function openPlan(id){
  const p=DB.plans.find(x=>x.id===id);if(!p)return;
  openModal(p.name,`
    <span class="tag cat">${esc(p.type||'Plan')}</span>
    <table><thead><tr><th>Übung</th><th class="num">Sätze</th><th class="num">Wdh</th></tr></thead>
    <tbody>${p.items.map(it=>`<tr><td>${esc(it.exName)}</td><td class="num">${esc(it.targetSets||'–')}</td><td class="num">${esc(it.targetReps||'–')}</td></tr>`).join('')}</tbody></table>
    <button class="btn btn-accent btn-block" onclick="startFromPlan('${id}')">▶ Training mit diesem Plan starten</button>
    <div class="spacer"></div>
    <button class="btn btn-block" onclick="editPlan('${id}')">Bearbeiten</button>
  `);
}
function startFromPlan(id){
  const p=DB.plans.find(x=>x.id===id);if(!p)return;
  draft={date:todayISO(),duration:'',notes:'',startTs:Date.now(),entries:p.items.map(it=>{
    const sets=[];const n=parseInt(it.targetSets)||3;for(let k=0;k<n;k++)sets.push({w:'',reps:'',rpe:''});
    return {exId:it.exId,exName:it.exName,sets};
  })};
  closeModal();go('log');
}

/* ---- Profile ---- */
function editProfile(){
  const p=DB.profile;
  openModal('Profil',`
    ${p.photo?`<div class="center"><img src="${p.photo}" style="width:90px;height:90px;border-radius:50%;object-fit:cover"></div>`:''}
    <label>Profilbild</label><input type="file" accept="image/*" id="pf_photo" onchange="setProfilePhoto(this)">
    <label>Name</label><input id="pf_name" value="${esc(p.name)}">
    <div class="field-row">
      <div><label>Gewicht (${U()})</label><input inputmode="decimal" id="pf_weight" value="${esc(p.weight)}"></div>
      <div><label>Größe (cm)</label><input inputmode="numeric" id="pf_height" value="${esc(p.height)}"></div>
    </div>
    <label>Alter</label><input inputmode="numeric" id="pf_age" value="${esc(p.age)}">
    <div class="spacer"></div>
    <button class="btn btn-primary btn-block" onclick="saveProfile()">Speichern</button>
  `);
}
async function setProfilePhoto(input){if(!input.files[0])return;DB.profile.photo=await fileToThumb(input.files[0],400);}
function saveProfile(){
  Object.assign(DB.profile,{name:$('#pf_name').value.trim(),weight:$('#pf_weight').value,height:$('#pf_height').value,age:$('#pf_age').value});
  save();closeModal();viewMore();toast('Profil gespeichert ✓');
}

/* ---- Export / Import ---- */
function download(name,content,type){
  const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
}
function exportJSON(){download('gymtrack-backup-'+todayISO()+'.json',JSON.stringify(DB,null,2),'application/json');toast('Backup erstellt ✓');}
function exportCSV(){
  const rows=[['Datum','Übung','Kategorie','Satz','Gewicht','Wdh','RPE','Dauer_Min','Notizen']];
  DB.workouts.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(w=>{
    w.entries.forEach(e=>{const ex=exById(e.exId);e.sets.forEach((s,j)=>{
      rows.push([w.date,e.exName,(ex&&ex.category)||'',j+1,s.w,s.reps,s.rpe||'',w.duration||'',(w.notes||'').replace(/\n/g,' ')]);
    });});
  });
  const csv=rows.map(r=>r.map(c=>{c=String(c);return /[",;\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(';')).join('\n');
  download('gymtrack-'+todayISO()+'.csv','\ufeff'+csv,'text/csv');toast('CSV erstellt ✓');
}
function importJSON(input){
  if(!input.files[0])return;
  const fr=new FileReader();
  fr.onload=()=>{try{
    const data=JSON.parse(fr.result);
    if(!data.exercises||!data.workouts)throw 0;
    if(!confirm('Backup importieren? Aktuelle Daten werden ersetzt.'))return;
    DB=Object.assign(blankDB(),data);save();render();toast('Backup importiert ✓');
  }catch(e){toast('Ungültige Datei');}};
  fr.readAsText(input.files[0]);
}
function resetAll(){if(!confirm('Wirklich ALLE Daten unwiderruflich löschen?'))return;if(!confirm('Sicher? Lege vorher ein Backup an!'))return;DB=blankDB();save();render();toast('Zurückgesetzt');}

/* ============================ MODAL ============================ */
function openModal(title,html){
  $('#modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal"><div class="modal-head"><h2>${esc(title)}</h2><button class="close-x" onclick="closeModal()">✕</button></div>${html}</div></div>`;
}
function openModalRaw(){}
function closeModal(){$('#modalRoot').innerHTML='';}

/* ============================ PROFILE BTN ============================ */
$('#profileBtn').onclick=editProfile;

seedIfEmpty();
